# This file is the hypridle configuration file

general {
    lock_cmd = pidof hyprlock || hyprlock # Avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session # Lock before suspend
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })' # To avoid having to press a key twice to turn on the display.
}

# Dimming the screen due to inactivity
listener {
    timeout = 150 # 2.5 min
    on-timeout = brightnessctl -s set 10 # Set monitor backlight to minimum
    on-resume = brightnessctl -r # Restore monitor backlight
}

# Turn off keyboard backlight
listener { 
    timeout = 150 # 2.5min
    on-timeout = brightnessctl -sd rgb:kbd_backlight set 0
    on-resume = brightnessctl -rd rgb:kbd_backlight
}

# Lock the screen after inactivity
listener {
    timeout = 300 # 5min
    on-timeout = loginctl lock-session 
}

# Turn off the disaplay after inactivity
listener {
    timeout = 330 # 5.5min
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })' && brightnessctl -r
}

# Suspend pc
listener {
    timeout = 600 # 10min
    on-timeout = systemctl suspend
}
