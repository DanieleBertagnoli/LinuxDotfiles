# Launch Waybar
exec-once = ~/.config/waybar/launch.sh

# Initialize waypaper
exec-once = waypaper --restore
exec-once = hyprpaper

# Using hypridle
exec-once = hypridle

# Load SwayNC Notification Manager
exec-once = swaync

# Start ewww daemon
exec-once = ags &

# Load GTK settings
exec-once = ~/.config/dotfiles/scripts/set_gtk.sh

# Exec post installtion (if needed)
exec-once = ~/.config/dotfiles/scripts/post_install.sh

# Gnome keyring
exec-once = gnome-keyring-daemon --start --components=secrets,ssh
